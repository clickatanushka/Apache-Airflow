version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned stock price data from raw source"
    columns:
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'GOOGL', 'MSFT', 'AMZN', 'META', 'TSLA', 'NFLX', 'NVDA', 'JPM', 'BAC']
      - name: price_date
        tests:
          - not_null
      - name: close_price
        tests:
          - not_null
      - name: volume
        tests:
          - not_null

  - name: stock_performance
    description: "Final analytics table with trend signals"
    columns:
      - name: trend_signal
        tests:
          - not_null
          - accepted_values:
              values: ['ABOVE_MA', 'BELOW_MA']
      - name: close_price
        tests:
          - not_null