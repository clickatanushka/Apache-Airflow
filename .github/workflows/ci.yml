name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install black flake8 sqlfluff

      - name: Run black
        run: black --check ingestion/ dags/

      - name: Run flake8
        run: flake8 ingestion/ dags/

      - name: Run sqlfluff
        run: |
          sqlfluff lint dbt_project/models/ --dialect postgres